<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- Upper wing -->
  <polygon points="7,15 21,9 23,15" fill="#374151"/>
  <!-- Lower wing -->
  <polygon points="7,17 21,23 23,17" fill="#374151"/>
  <!-- Fuselage -->
  <polygon points="5,14.5 29,16 5,17.5" fill="#1f2937"/>
  <!-- Wing highlights -->
  <line x1="7" y1="15" x2="21" y2="10.5" stroke="#4b5563" stroke-width="0.6"/>
  <line x1="7" y1="17" x2="21" y2="21.5" stroke="#4b5563" stroke-width="0.6"/>
  <!-- Centerline -->
  <line x1="9" y1="16" x2="25" y2="16" stroke="#9ca3af" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Cockpit -->
  <circle cx="22" cy="16" r="2" fill="#7f1d1d"/>
  <circle cx="22" cy="16" r="1" fill="#dc2626"/>
  <!-- Engine glows -->
  <ellipse cx="6" cy="13.5" rx="2" ry="1.4" fill="#dc2626" fill-opacity="0.9"/>
  <ellipse cx="6" cy="18.5" rx="2" ry="1.4" fill="#dc2626" fill-opacity="0.9"/>
  <!-- Engine bright cores -->
  <ellipse cx="6" cy="13.5" rx="1" ry="0.7" fill="#fca5a5"/>
  <ellipse cx="6" cy="18.5" rx="1" ry="0.7" fill="#fca5a5"/>
</svg>
